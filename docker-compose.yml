version: "3.8"

services:

  postgres:
    image: postgres:16-alpine
    container_name: aguia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aguia
      POSTGRES_PASSWORD: aguia
      POSTGRES_DB: aguia
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - aguia_network

  gpswox-gateway:
    build:
      context: .
      dockerfile: services/gpswox-gateway/Dockerfile
    container_name: aguia-gpswox-gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://aguia:aguia@postgres:5432/aguia
    volumes:
      - ./services/gpswox-gateway/logs:/app/logs
    networks:
      - aguia_network
    shm_size: "512mb"
    security_opt:
      - seccomp:unconfined

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: aguia-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_PORT: 3000
      GATEWAY_URL: http://gpswox-gateway:3001
      DATABASE_URL: postgresql://aguia:aguia@postgres:5432/aguia
      CORS_ORIGIN: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - gpswox-gateway
    networks:
      - aguia_network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: aguia-web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - aguia_network

  sms-hub-postgres:
    image: postgres:16-alpine
    container_name: ag-smshub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ag_smshub
      POSTGRES_PASSWORD: ag_smshub
      POSTGRES_DB: ag_smshub
    volumes:
      - sms_hub_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - aguia_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ag_smshub -d ag_smshub"]
      interval: 5s
      timeout: 5s
      retries: 10

  sms-hub-redis:
    image: redis:7-alpine
    container_name: ag-smshub-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - aguia_network

  sms-hub-api:
    build:
      context: .
      dockerfile: services/sms-hub-api/Dockerfile
    container_name: ag-smshub-api
    restart: unless-stopped
    env_file:
      - .env.sms-hub
    environment:
      SMS_HUB_DATABASE_URL: postgresql://ag_smshub:ag_smshub@sms-hub-postgres:5432/ag_smshub
      SMS_HUB_REDIS_URL: redis://sms-hub-redis:6379
      SMS_HUB_API_PORT: 4000
      SMS_HUB_CORS_ORIGIN: http://localhost:8080,http://localhost:5173
      AGUIA_ADMIN_SECRET: ${ADMIN_SECRET:-altere-este-segredo-admin}
      AGUIA_SERVICE_SECRET: ${AGUIA_SERVICE_SECRET:-altere-este-segredo-servico-aguia}
    ports:
      - "4000:4000"
    depends_on:
      sms-hub-postgres:
        condition: service_healthy
    networks:
      - aguia_network

networks:
  aguia_network:
    driver: bridge

volumes:
  postgres_data:
  sms_hub_postgres_data:
