version: "3.8"

services:

  # ─── Serviço Playwright GPSWox ──────────────────────────────────────────────
  playwright-gpswox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: playwright-gpswox
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3001:3001"          # Exponha apenas internamente se n8n estiver na mesma rede
    volumes:
      - ./logs:/app/logs     # Persiste logs e screenshots de diagnóstico
    networks:
      - n8n_network
    # Necessário para Playwright/Chromium em Docker
    shm_size: "512mb"
    security_opt:
      - seccomp:unconfined   # Necessário para o Chromium em alguns ambientes

  # ─── n8n (descomente se ainda não tiver seu próprio compose) ─────────────────
  # n8n:
  #   image: n8nio/n8n:latest
  #   container_name: n8n
  #   restart: unless-stopped
  #   ports:
  #     - "5678:5678"
  #   environment:
  #     - N8N_HOST=0.0.0.0
  #     - N8N_PORT=5678
  #   volumes:
  #     - n8n_data:/home/node/.n8n
  #   networks:
  #     - n8n_network

networks:
  n8n_network:
    external: true   # Use a rede que seu n8n já está. Crie com: docker network create n8n_network

