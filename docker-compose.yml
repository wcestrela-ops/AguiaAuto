version: "3.8"

services:

  postgres:
    image: postgres:16-alpine
    container_name: aguia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aguia
      POSTGRES_PASSWORD: aguia
      POSTGRES_DB: aguia
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - aguia_network

  gpswox-gateway:
    build:
      context: .
      dockerfile: services/gpswox-gateway/Dockerfile
    container_name: aguia-gpswox-gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://aguia:aguia@postgres:5432/aguia
    volumes:
      - ./services/gpswox-gateway/logs:/app/logs
    networks:
      - aguia_network
    shm_size: "512mb"
    security_opt:
      - seccomp:unconfined

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: aguia-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_PORT: 3000
      GATEWAY_URL: http://gpswox-gateway:3001
      DATABASE_URL: postgresql://aguia:aguia@postgres:5432/aguia
      CORS_ORIGIN: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - gpswox-gateway
    networks:
      - aguia_network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: aguia-web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - aguia_network

networks:
  aguia_network:
    driver: bridge

volumes:
  postgres_data:
